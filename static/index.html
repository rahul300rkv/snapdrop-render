<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapdrop — Download Anything</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,255,71,0.08);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(42px, 8vw, 72px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }

  h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 48px;
    letter-spacing: 0.02em;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap .icon {
    position: absolute;
    left: 20px;
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 20px 52px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  button.fetch-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: var(--radius);
    padding: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  button.fetch-btn:hover { transform: translateY(-1px); opacity: 0.92; }
  button.fetch-btn:active { transform: translateY(0); }
  button.fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .media-preview { position: relative; background: #000; }

  .media-preview img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    display: block;
    opacity: 0.85;
  }

  .media-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
  }

  .media-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .media-info {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #aaa;
    display: flex;
    gap: 16px;
  }

  .formats-section { padding: 20px; }

  .formats-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .formats-list { display: flex; flex-direction: column; gap: 8px; }

  .format-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.15s, background 0.15s;
  }

  .format-row:hover {
    border-color: rgba(232,255,71,0.3);
    background: rgba(232,255,71,0.04);
  }

  .format-info { display: flex; align-items: center; gap: 12px; }

  .quality-badge {
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  .format-ext {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .dl-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .dl-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }

  .error-box {
    background: rgba(255,80,80,0.07);
    border: 1.5px solid rgba(255,80,80,0.2);
    border-radius: var(--radius);
    padding: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #ff6b6b;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .platforms {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .platform-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="badge">SNAPDROP v2.0</div>
  <h1>Download<span>Anything.</span></h1>
  <p class="subtitle">// paste a link. get your video. done.</p>

  <div class="input-group">
    <div class="input-wrap">
      <span class="icon">🔗</span>
      <input type="text" id="urlInput" placeholder="https://www.instagram.com/reel/..." />
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchMedia()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">↓ Get Download Links</span>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="media-preview">
      <img id="thumbnail" src="" alt="thumbnail" />
      <div class="media-meta">
        <div class="media-title" id="mediaTitle"></div>
        <div class="media-info">
          <span id="mediaAuthor"></span>
          <span id="mediaDuration"></span>
        </div>
      </div>
    </div>
    <div class="formats-section">
      <div class="formats-label">Available Formats</div>
      <div class="formats-list" id="formatsList"></div>
    </div>
  </div>

  <div class="platforms">
    <span class="platform-tag">instagram</span>
    <span class="platform-tag">youtube</span>
    <span class="platform-tag">twitter/x</span>
    <span class="platform-tag">tiktok</span>
    <span class="platform-tag">facebook</span>
    <span class="platform-tag">+ more</span>
  </div>
</div>

<script>
  const API_BASE = 'https://youtubedownloader.up.railway.app';

  async function fetchMedia() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    const btn = document.getElementById('fetchBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');
    const resultCard = document.getElementById('resultCard');

    errorBox.style.display = 'none';
    resultCard.style.display = 'none';
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Fetching...';

    try {
      const res = await fetch(`${API_BASE}/download?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      if (data.status === 'error') {
        showError(data.message || 'Failed to fetch media.');
        return;
      }

      document.getElementById('thumbnail').src = data.thumbnail || '';
      document.getElementById('mediaTitle').textContent = data.title || 'Untitled';
      document.getElementById('mediaAuthor').textContent = data.author ? `@${data.author}` : '';
      document.getElementById('mediaDuration').textContent = data.duration ? `⏱ ${data.duration}` : '';

      const list = document.getElementById('formatsList');
      list.innerHTML = '';

      const formats = data.formats || [];
      if (formats.length > 0) {
        formats.filter(f => !f.isAudio).forEach(f => {
          list.appendChild(makeFormatRow(f.label, f.container, f.size, f.downloadUrl));
        });
      } else if (data.download_url) {
        list.appendChild(makeFormatRow('Best', data.ext || 'mp4', null, data.download_url));
      } else {
        showError('No downloadable formats found.');
        return;
      }

      resultCard.style.display = 'block';

    } catch (e) {
      showError('Network error. Make sure the API is running.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '↓ Get Download Links';
    }
  }

  function makeFormatRow(label, ext, size, dlUrl) {
    const row = document.createElement('div');
    row.className = 'format-row';
    row.innerHTML = `
      <div class="format-info">
        <span class="quality-badge">${label}</span>
        <span class="format-ext">${ext}</span>
        ${size ? `<span style="font-family:monospace;font-size:11px;color:#555">${(size/1048576).toFixed(1)} MB</span>` : ''}
      </div>
      <a class="dl-btn" href="${dlUrl}" target="_blank" rel="noopener">↓ Download</a>
    `;
    return row;
  }

  function showError(msg) {
    const errorBox = document.getElementById('errorBox');
    errorBox.textContent = '⚠ ' + msg;
    errorBox.style.display = 'block';
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchMedia();
  });
</script>
</body>
</html>
