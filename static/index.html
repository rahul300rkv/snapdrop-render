<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapdrop — Download Anything</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0c;
  --surface: #141414;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --muted: #444;
  --radius: 18px;

  /* Platform accent - changes dynamically */
  --accent: #e8ff47;
  --accent-rgb: 232, 255, 71;
  --accent2: #b8cc00;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px 80px;
  overflow-x: hidden;
  transition: background 0.5s ease;
}

/* Animated noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 100;
  opacity: 0.6;
}

/* Dynamic glow blob */
.glow-blob {
  position: fixed;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(var(--accent-rgb), 0.07) 0%, transparent 65%);
  top: -250px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 0;
  transition: background 0.6s ease;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 680px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeDown 0.6s ease both;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.wordmark {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}

h1 {
  font-size: clamp(52px, 10vw, 88px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
}

h1 em {
  font-style: normal;
  color: var(--accent);
  transition: color 0.4s ease;
}

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── Platform Selector ── */
.selector-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  padding-left: 2px;
}

.platform-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.1s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.platform-btn {
  position: relative;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  user-select: none;
}

.platform-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(var(--p-rgb, 232,255,71), 0.06);
  opacity: 0;
  transition: opacity 0.25s;
}

.platform-btn:hover::before,
.platform-btn.active::before { opacity: 1; }

.platform-btn:hover {
  border-color: rgba(var(--p-rgb, 232,255,71), 0.4);
  transform: translateY(-2px);
}

.platform-btn.active {
  border-color: rgba(var(--p-rgb, 232,255,71), 0.8);
  box-shadow: 0 0 0 1px rgba(var(--p-rgb, 232,255,71), 0.15),
              0 8px 32px rgba(var(--p-rgb, 232,255,71), 0.12);
  transform: translateY(-2px);
}

.platform-btn .p-icon {
  font-size: 26px;
  line-height: 1;
  filter: grayscale(0.3);
  transition: filter 0.2s, transform 0.2s;
}

.platform-btn:hover .p-icon,
.platform-btn.active .p-icon {
  filter: grayscale(0);
  transform: scale(1.1);
}

.platform-btn .p-name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  transition: color 0.2s;
}

.platform-btn.active .p-name {
  color: var(--text);
}

.platform-btn .p-check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #000;
  font-weight: 900;
  opacity: 0;
  transform: scale(0);
  transition: opacity 0.2s, transform 0.2s;
}

.platform-btn.active .p-check {
  opacity: 1;
  transform: scale(1);
}

/* ── Mode Panel ── */
.mode-panel {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
  animation: fadeUp 0.6s 0.2s ease both;
  transition: border-color 0.4s;
}

.mode-panel.has-platform {
  border-color: rgba(var(--accent-rgb), 0.2);
}

.mode-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}

.mode-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(var(--accent-rgb), 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: background 0.4s;
}

.mode-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.mode-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.mode-body { padding: 20px 24px; }

/* URL input */
.input-wrap {
  position: relative;
  margin-bottom: 14px;
}

.input-prefix {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  pointer-events: none;
  user-select: none;
}

input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 16px 16px 44px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}

input[type="text"]:focus {
  border-color: rgba(var(--accent-rgb), 0.5);
  box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.07);
}

input::placeholder { color: #333; }

/* Tips chips */
.tips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.tip-chip {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.tip-chip:hover {
  border-color: rgba(var(--accent-rgb), 0.4);
  color: var(--text);
  background: rgba(var(--accent-rgb), 0.05);
}

/* Fetch button */
.fetch-btn {
  width: 100%;
  background: var(--accent);
  color: #0a0a0a;
  border: none;
  border-radius: 12px;
  padding: 18px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: transform 0.15s, opacity 0.15s, background 0.4s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.fetch-btn:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.9; }
.fetch-btn:active:not(:disabled) { transform: translateY(0); }
.fetch-btn:disabled { opacity: 0.45; cursor: not-allowed; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  display: none;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
}
.empty-state .es-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Error ── */
.error-box {
  background: rgba(255,70,70,0.07);
  border: 1.5px solid rgba(255,70,70,0.18);
  border-radius: 12px;
  padding: 16px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #ff6b6b;
  display: none;
  margin-top: 12px;
  animation: fadeUp 0.25s ease;
  line-height: 1.6;
}

/* ── Result Card ── */
.result-card {
  background: var(--surface);
  border: 1.5px solid rgba(var(--accent-rgb), 0.15);
  border-radius: var(--radius);
  overflow: hidden;
  display: none;
  animation: fadeUp 0.35s ease;
  margin-top: 16px;
}

.thumb-wrap {
  position: relative;
  background: #000;
  max-height: 260px;
  overflow: hidden;
}

.thumb-wrap img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  display: block;
  opacity: 0.8;
  transition: opacity 0.3s;
}

.thumb-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.92));
}

.result-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.result-meta {
  display: flex;
  gap: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #888;
}

.platform-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(var(--accent-rgb), 0.15);
  color: var(--accent);
  border-radius: 100px;
  padding: 2px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  font-weight: 500;
  transition: background 0.4s, color 0.4s;
}

.formats-wrap { padding: 20px; }

.formats-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.format-list { display: flex; flex-direction: column; gap: 8px; }

.format-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  transition: border-color 0.2s, background 0.2s;
}

.format-row:hover {
  border-color: rgba(var(--accent-rgb), 0.25);
  background: rgba(var(--accent-rgb), 0.04);
}

.format-left { display: flex; align-items: center; gap: 10px; }

.q-badge {
  background: rgba(var(--accent-rgb), 0.1);
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  transition: background 0.4s, color 0.4s;
  white-space: nowrap;
}

.q-ext {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
}

.q-size {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #333;
}

.dl-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 7px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.dl-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .platform-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .platform-btn { padding: 12px 8px; }
  .platform-btn .p-icon { font-size: 22px; }
  h1 { font-size: 48px; }
}
</style>
</head>
<body>

<div class="glow-blob" id="glowBlob"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="wordmark">SNAPDROP · v2.1</div>
    <h1>Snap<em id="accentWord">Drop</em></h1>
    <p class="tagline">// pick a platform. paste a link. done.</p>
  </div>

  <!-- Platform Selector -->
  <div class="selector-label">Select Platform</div>
  <div class="platform-grid" id="platformGrid">

    <button class="platform-btn" data-platform="instagram"
      data-rgb="193,53,132" data-color="#E1306C"
      data-icon="📸" data-name="Instagram"
      data-placeholder="instagram.com/reel/..."
      data-tips="Reels,Posts,Stories,IGTV"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">📸</div>
      <div class="p-name">Instagram</div>
    </button>

    <button class="platform-btn" data-platform="youtube"
      data-rgb="255,0,0" data-color="#FF0000"
      data-icon="▶️" data-name="YouTube"
      data-placeholder="youtube.com/watch?v=... or youtu.be/..."
      data-tips="Videos,Shorts,Playlists"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">▶️</div>
      <div class="p-name">YouTube</div>
    </button>

    <button class="platform-btn" data-platform="tiktok"
      data-rgb="105,201,208" data-color="#69C9D0"
      data-icon="🎵" data-name="TikTok"
      data-placeholder="tiktok.com/@user/video/..."
      data-tips="Videos,Sounds"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">🎵</div>
      <div class="p-name">TikTok</div>
    </button>

    <button class="platform-btn" data-platform="twitter"
      data-rgb="29,161,242" data-color="#1DA1F2"
      data-icon="🐦" data-name="Twitter / X"
      data-placeholder="x.com/user/status/..."
      data-tips="Videos,GIFs,Spaces"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">🐦</div>
      <div class="p-name">Twitter / X</div>
    </button>

    <button class="platform-btn" data-platform="facebook"
      data-rgb="24,119,242" data-color="#1877F2"
      data-icon="👍" data-name="Facebook"
      data-placeholder="facebook.com/watch/?v=..."
      data-tips="Videos,Reels,Stories"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">👍</div>
      <div class="p-name">Facebook</div>
    </button>

    <button class="platform-btn" data-platform="other"
      data-rgb="160,160,160" data-color="#aaa"
      data-icon="🌐" data-name="Other"
      data-placeholder="paste any supported URL..."
      data-tips="Vimeo,Reddit,Dailymotion,+1000 more"
      onclick="selectPlatform(this)">
      <div class="p-check">✓</div>
      <div class="p-icon">🌐</div>
      <div class="p-name">Other</div>
    </button>

  </div>

  <!-- Mode Panel -->
  <div class="mode-panel" id="modePanel">
    <div class="empty-state">
      <div class="es-icon">↑</div>
      <p>Select a platform above<br>to get started</p>
    </div>
  </div>

</div>

<script>
  const API_BASE = 'https://snapdownloader.up.railway.app';
  let activePlatform = null;

  function selectPlatform(btn) {
    // Deactivate all
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const p = {
      platform: btn.dataset.platform,
      rgb:      btn.dataset.rgb,
      color:    btn.dataset.color,
      icon:     btn.dataset.icon,
      name:     btn.dataset.name,
      placeholder: btn.dataset.placeholder,
      tips:     btn.dataset.tips.split(','),
    };

    activePlatform = p;

    // Update CSS vars
    document.documentElement.style.setProperty('--accent-rgb', p.rgb);
    document.documentElement.style.setProperty('--accent', p.color);
    document.documentElement.style.setProperty('--p-rgb', p.rgb);

    // Update platform buttons' own rgb
    btn.style.setProperty('--p-rgb', p.rgb);

    // Update glow
    document.getElementById('glowBlob').style.background =
      `radial-gradient(circle, rgba(${p.rgb},0.08) 0%, transparent 65%)`;

    // Render mode panel
    renderModePanel(p);
  }

  function renderModePanel(p) {
    const panel = document.getElementById('modePanel');
    panel.classList.add('has-platform');

    const tipsHTML = p.tips.map(t =>
      `<span class="tip-chip" onclick="fillTip('${t}')">${t}</span>`
    ).join('');

    panel.innerHTML = `
      <div class="mode-header">
        <div class="mode-icon" id="modeIcon">${p.icon}</div>
        <div>
          <div class="mode-title">${p.name} Downloader</div>
          <div class="mode-subtitle">Supports: ${p.tips.join(' · ')}</div>
        </div>
      </div>
      <div class="mode-body">
        <div class="input-wrap">
          <span class="input-prefix">🔗</span>
          <input type="text" id="urlInput"
            placeholder="${p.placeholder}"
            onkeydown="if(event.key==='Enter') fetchMedia()" />
        </div>
        <div class="tips">${tipsHTML}</div>
        <button class="fetch-btn" id="fetchBtn" onclick="fetchMedia()">
          <div class="spinner" id="spinner"></div>
          <span id="btnText">↓ Get Download Links</span>
        </button>
        <div class="error-box" id="errorBox"></div>
        <div class="result-card" id="resultCard"></div>
      </div>
    `;

    // Focus input
    setTimeout(() => document.getElementById('urlInput')?.focus(), 100);
  }

  function fillTip(tip) {
    const input = document.getElementById('urlInput');
    if (input) {
      input.placeholder = `e.g. ${activePlatform?.placeholder || ''}`;
      input.focus();
    }
  }

  async function fetchMedia() {
    const input = document.getElementById('urlInput');
    const url = input?.value.trim();
    if (!url) {
      input?.focus();
      return;
    }

    const btn      = document.getElementById('fetchBtn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');
    const resultCard = document.getElementById('resultCard');

    errorBox.style.display = 'none';
    resultCard.style.display = 'none';
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Fetching...';

    try {
      const res  = await fetch(`${API_BASE}/download?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      if (data.status === 'error') {
        showError(data.message || 'Something went wrong.');
        return;
      }

      renderResult(data);

    } catch (e) {
      showError('Network error — make sure the API is reachable.');
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '↓ Get Download Links';
    }
  }

  function renderResult(data) {
    const resultCard = document.getElementById('resultCard');
    const p = activePlatform;

    const formats = (data.formats || []).filter(f => !f.isAudio);
    if (!formats.length && data.download_url) {
      formats.push({ label: 'Best', container: data.ext || 'mp4', downloadUrl: data.download_url, size: null });
    }

    const formatsHTML = formats.map(f => `
      <div class="format-row">
        <div class="format-left">
          <span class="q-badge">${f.label}</span>
          <span class="q-ext">${f.container}</span>
          ${f.size ? `<span class="q-size">${(f.size/1048576).toFixed(1)}MB</span>` : ''}
        </div>
        <a class="dl-btn" href="${f.downloadUrl}" target="_blank" rel="noopener">↓ Save</a>
      </div>
    `).join('');

    resultCard.innerHTML = `
      ${data.thumbnail ? `
        <div class="thumb-wrap">
          <img src="${data.thumbnail}" alt="thumbnail" onerror="this.parentElement.style.display='none'" />
          <div class="thumb-overlay">
            <div style="margin-bottom:8px">
              <span class="platform-pill">${p?.icon || ''} ${data.platform || p?.name || ''}</span>
            </div>
            <div class="result-title">${data.title || 'Untitled'}</div>
            <div class="result-meta">
              ${data.author ? `<span>@${data.author}</span>` : ''}
              ${data.duration ? `<span>⏱ ${data.duration}s</span>` : ''}
            </div>
          </div>
        </div>
      ` : ''}
      <div class="formats-wrap">
        <div class="formats-title">${formats.length} Format${formats.length !== 1 ? 's' : ''} Available</div>
        <div class="format-list">${formatsHTML || '<p style="font-family:monospace;font-size:12px;color:#555">No formats found.</p>'}</div>
      </div>
    `;

    resultCard.style.display = 'block';
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    if (!box) return;
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }
</script>
</body>
</html>
